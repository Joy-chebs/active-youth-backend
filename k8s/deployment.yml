apiVersion: apps/v1
kind: Deployment
metadata:
  name: activeyouth-api
  namespace: active-youth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: activeyouth-api
  template:
    metadata:
      labels:
        app: activeyouth-api
    spec:
      containers:
        - name: api
          image: joyjoy05/activeyouth-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          # Readiness probe — k8s won't route traffic until /health returns 200
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # Liveness probe — k8s restarts pod if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: KAFKA_BROKERS
            - name: KAFKA_CLIENT_ID
              value: "activeyouths-backend"
            - name: KAFKA_GROUP_ID
              value: "activeyouths-consumers"
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: activeyouth-secrets
                  key: CLOUDINARY_API_SECRET
